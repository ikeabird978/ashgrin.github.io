        /* 全局至上主义重置：极致极简、无冗余 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 暖色调基底：奶白暖杏高级底色 */
            background-color: #F9F5F0;
            color: #2D2A26;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
            letter-spacing: 0.5px;
        }

        /* 全局布局 左右分栏 至上几何对称 */
        .blog-wrap {
            display: flex;
            min-height: 100vh;
        }

        /* 左侧导航栏 暖咖色块 至上规整几何 */
        .sidebar {
            width: 240px;
            background-color: #EFE6DD;
            padding: 60px 20px;
            border-right: 1px solid #E0D6CC;
        }

        .sidebar-title {
            font-size: 22px;
            font-weight: 600;
            color: #8C6D5C;
            text-align: center;
            margin-bottom: 50px;
            /* 至上极简线条装饰 */
            padding-bottom: 15px;
            border-bottom: 2px solid #D4C5B8;
        }

        /* 导航按钮 纯几何方块hover 无花哨动画 */
        .nav-item {
            display: block;
            width: 100%;
            padding: 14px 0;
            margin: 8px 0;
            text-align: center;
            background: transparent;
            border: none;
            font-size: 15px;
            color: #5A4F47;
            cursor: pointer;
            border-radius: 2px;
            transition: 0.3s ease;
        }

        .nav-item:hover {
            background-color: #D4C5B8;
            color: #fff;
        }

        .nav-item.active {
            background-color: #8C6D5C;
            color: #FFFFFF;
        }

        /* 右侧主内容区 大量留白 至上核心 */
        .main-box {
            flex: 1;
            padding: 60px 80px;
        }

        /* 页面默认隐藏 切换逻辑 */
        .page {
            display: none;
            animation: fade 0.4s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fade {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        /* 内容标题 极简几何排版 */
        .page-title {
            font-size: 28px;
            color: #8C6D5C;
            margin-bottom: 30px;
            padding-left: 12px;
            border-left: 4px solid #BFA998;
        }

        /* 内容文本 极致留白行高 */
        .content-text {
            font-size: 16px;
            line-height: 2;
            color: #4A4540;
            margin-bottom: 20px;
        }

        /* 分割线 极简细线条 */
        .divide {
            width: 100px;
            height: 1px;
            background: #D4C5B8;
            margin: 40px 0;
        }

        /* 适配手机端 */
        @media (max-width: 768px) {
            .blog-wrap {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                padding: 30px 10px;
            }
            .main-box {
                padding: 30px 20px;
            }

    <script>
        const navItems = document.querySelectorAll('.nav-item');
        const pages = document.querySelectorAll('.page');

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                // 清空所有选中状态
                navItems.forEach(nav => nav.classList.remove('active'));
                pages.forEach(page => page.classList.remove('active'));
